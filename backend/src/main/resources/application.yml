spring:
  application:
    name: club-management
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/club_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  mybatis-plus:
    configuration:
      map-underline-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        logic-delete-field: isDeleted
        logic-delete-value: 1
        logic-not-delete-value: 0

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

logging:
  level:
    com.club: debug

jwt:
  secret: ${JWT_SECRET:club-management-secret-key-for-jwt-token-authentication-123456}

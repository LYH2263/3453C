services:
  db:
    image: mysql:8.0
    container_name: club-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: club_db
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "34530:3306"
    volumes:
      - ./mysql:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - club-net

  backend:
    build:
      context: ./backend
      network: host
    container_name: club-backend
    dns:
      - 8.8.8.8
      - 114.114.114.114
    restart: always
    ports:
      - "8453:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/club_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    depends_on:
      - db
    networks:
      - club-net

  frontend:
    build:
      context: ./frontend
      network: host
    container_name: club-frontend
    restart: always
    ports:
      - "3453:80"
    depends_on:
      - backend
    networks:
      - club-net

networks:
  club-net:
    driver: bridge

volumes:
  db_data:
